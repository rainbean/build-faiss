name: Build

# trigger on tags
on:
  push:
    tags:
      - "*"

# an undocumented permissions thing required for AWS Credentials
permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: faiss-linux-${{ github.ref_name }}.tar.zst
            command: build.sh
          - os: ubuntu-22.04-arm
            artifact: faiss-linux-arm64-${{ github.ref_name }}.tar.zst
            command: build.sh
          - os: windows-2022
            artifact: faiss-win64-${{ github.ref_name }}.7z
            command: build.ps1

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Add MSBuild to PATH
        if: contains(matrix.os, 'windows')
        uses: microsoft/setup-msbuild@v3

      - name: Free disk space
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Install CMake 3.28.6 (apt on Ubuntu 22.04 ships 3.22.x, FAISS requires >=3.23.1)
        if: contains(matrix.os, 'ubuntu')
        run: |
          curl -fsSL "https://cmake.org/files/v3.28/cmake-3.28.6-linux-$(uname -m).tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local

      - name: Install Linux build dependencies
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Build artifact
        working-directory: ${{ github.workspace }}
        run: ${{ github.workspace }}/scripts/${{ matrix.command }} ${{ matrix.artifact }}

      - name: Run correctness test (Linux)
        if: contains(matrix.os, 'ubuntu')
        working-directory: ${{ github.workspace }}
        run: |
          ./scripts/demo.sh
          ./build-demo/test_cosine

      - name: Run correctness test (Windows)
        if: contains(matrix.os, 'windows')
        working-directory: ${{ github.workspace }}
        run: |
          .\scripts\demo.ps1
          .\build-demo\Release\test_cosine.exe

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.aws_iam_role }}
          aws-region: ap-northeast-1

      - name: Upload artifact
        working-directory: ${{ github.workspace }}
        run: |
          aws s3 cp ${{ matrix.artifact }} ${{ secrets.aws_s3_bucket }}
